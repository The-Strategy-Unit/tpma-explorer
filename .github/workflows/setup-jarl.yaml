on:
  push:
    branches:
      - test-actions
  pull_request:
    branches:
      - test-actions
  workflow_dispatch:

name: jarl-check

permissions: read-all

jobs:
  jarl-check:
    name: jarl check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: etiennebacher/setup-jarl@v0.1.0
      - run: jarl check --fix --fail-on-warnings
